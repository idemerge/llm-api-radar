name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      # Install dependencies
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      # Type checking
      - name: Typecheck frontend
        run: cd frontend && npx tsc --noEmit

      - name: Typecheck backend
        run: cd backend && npx tsc --noEmit

      # Linting
      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Lint backend
        run: cd backend && npm run lint

      # Formatting
      - name: Format check
        run: |
          UNFORMATTED=$(npx -y prettier --list-different "frontend/**/*.{ts,tsx,js,jsx,json}" "backend/**/*.{ts,js,json}" "*.{json,md,yml,yaml}" 2>/dev/null || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::The following files are not formatted. Run 'npx prettier --write .' locally and commit."
            echo ""
            echo "$UNFORMATTED"
            echo ""
            echo "Tip: Install husky (npm install) to auto-format on commit."
            exit 1
          fi
          echo "All files formatted correctly."

      # Tests
      - name: Test frontend
        run: cd frontend && npm test

      - name: Test backend
        run: cd backend && npm test

      # Build
      - name: Build frontend
        run: cd frontend && npx vite build

      - name: Build backend
        run: cd backend && npm run build
